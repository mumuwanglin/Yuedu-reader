name: Localization

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "iOS/**/*.strings"
      - "scripts/check_localizations.rb"
      - ".github/workflows/localization.yml"
  push:
    branches:
      - main
    paths:
      - "iOS/**/*.strings"
      - "scripts/check_localizations.rb"
      - ".github/workflows/localization.yml"

jobs:
  localization:
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check localization files
        run: scripts/check_localizations.rb
